<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inscription</title>
    <link rel="stylesheet" href="../style/main.css">
</head>
<body>

<nav>
    <ul>
        <li><a href="../index.html">Accueil</a></li>
        <li><a href="connexion.html">Connexion</a></li>
    </ul>
</nav>

<section class="auth-page">
    <div class="auth-card fade-in">
        <h1>Créer un compte</h1>
        <p>Inscrivez-vous rapidement pour commencer à explorer nos voitures.</p>

        <div id="auth-message" class="auth-message"></div>

        <form onsubmit="validerInscription(event)" class="form">
            <div class="auth-input-group">
                <input type="text" id="nom" placeholder="Nom" required>
            </div>
            <div class="auth-input-group">
                <input type="email" id="email" placeholder="Email" required>
            </div>
            <div class="auth-input-group">
                <input type="password" id="password" placeholder="Mot de passe" required>
                <button type="button" class="toggle-password" onclick="togglePassword('password')">Voir</button>
            </div>
            <div class="auth-input-group">
                <input type="password" id="confirm" placeholder="Confirmer mot de passe" required>
                <button type="button" class="toggle-password" onclick="togglePassword('confirm')">Voir</button>
            </div>
            <button type="submit" class="btn">S'inscrire</button>
        </form>

        <div class="auth-footer">
            <span>Déjà inscrit ?</span>
            <a href="connexion.html">Se connecter</a>
        </div>
    </div>
</section>

<script src="../javascript/user.js"></script>

</body>
</html>
